version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Amsterdam
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Amsterdam
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
